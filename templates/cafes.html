<!DOCTYPE html>
<html lang="en">

<head>
                    <meta charset="UTF-8">
                    <title>All Cafes</title>

                    <link rel="stylesheet"
                                        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

                    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="cafes-page">

                    <div class="container mt-5">

                                        <h1 class="mb-4">All Cafes</h1>

                                        <table class="table table-dark table-striped table-hover">
                                                            <thead>
                                                                                <tr>
                                                                                                    {% for heading in
                                                                                                    cafes[0] %}
                                                                                                    <th>{{ heading }}
                                                                                                    </th>
                                                                                                    {% endfor %}
                                                                                </tr>
                                                            </thead>

                                                            <tbody>
                                                                                {% for row in cafes[1:] %}
                                                                                <tr>
                                                                                                    {% for item in row
                                                                                                    %}
                                                                                                    {% if item[0:4] ==
                                                                                                    "http" %}
                                                                                                    <td>
                                                                                                                        <a href="{{ item }}"
                                                                                                                                            target="_blank">
                                                                                                                                            Maps
                                                                                                                                            Link
                                                                                                                        </a>
                                                                                                    </td>
                                                                                                    {% else %}
                                                                                                    <td>{{ item }}</td>
                                                                                                    {% endif %}
                                                                                                    {% endfor %}
                                                                                </tr>
                                                                                {% endfor %}
                                                            </tbody>
                                        </table>

                                        <a class="btn btn-warning" href="{{ url_for('add') }}">
                                                            Add New Cafe
                                        </a>

                                        <a class="btn btn-light" href="{{ url_for('home') }}">
                                                            Return Home
                                        </a>

                    </div>
</body>

</html>
