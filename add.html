<!DOCTYPE html>
<html lang="en">

<head>
                    <meta charset="UTF-8">
                    <title>Add A New Cafe</title>

                    <link rel="stylesheet"
                                        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

                    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="add-page">

                    <div class="container mt-5">

                                        <h1 class="font-weight-bold mb-4">Add a new cafe into the database</h1>

                                        <form method="POST" novalidate>
                                                            {{ form.csrf_token }}

                                                            <div class="form-group">
                                                                                <label>Cafe name</label>
                                                                                <input type="text" class="form-control"
                                                                                                    name="cafe"
                                                                                                    required>
                                                            </div>

                                                            <div class="form-group">
                                                                                {{ form.location.label }}
                                                                                {{ form.location(class="form-control")
                                                                                }}

                                                                                {% for error in form.location.errors %}
                                                                                <br>
                                                                                <small class="error-text">{{ error
                                                                                                    }}</small>
                                                                                {% endfor %}
                                                            </div>

                                                            <div class="form-group">
                                                                                <label>Opening Time e.g. 8AM</label>
                                                                                <input type="text" class="form-control"
                                                                                                    name="open"
                                                                                                    required>
                                                            </div>

                                                            <div class="form-group">
                                                                                <label>Closing Time e.g. 5:30PM</label>
                                                                                <input type="text" class="form-control"
                                                                                                    name="close"
                                                                                                    required>
                                                            </div>

                                                            <div class="form-group">
                                                                                <label>Coffee Rating</label>
                                                                                <select class="form-control"
                                                                                                    name="coffee">
                                                                                                    <option>☕</option>
                                                                                                    <option>☕☕</option>
                                                                                                    <option>☕☕☕</option>
                                                                                                    <option>☕☕☕☕
                                                                                                    </option>
                                                                                                    <option>☕☕☕☕☕
                                                                                                    </option>
                                                                                </select>
                                                            </div>

                                                            <div class="form-group">
                                                                                <label>Wifi Strength Rating</label>
                                                                                <select class="form-control"
                                                                                                    name="wifi">
                                                                                                    <option>✘</option>
                                                                                                    <option>💪</option>
                                                                                                    <option>💪💪
                                                                                                    </option>
                                                                                                    <option>💪💪💪
                                                                                                    </option>
                                                                                                    <option>💪💪💪💪
                                                                                                    </option>
                                                                                                    <option>💪💪💪💪💪
                                                                                                    </option>
                                                                                </select>
                                                            </div>

                                                            <div class="form-group">
                                                                                <label>Power Socket Availability</label>
                                                                                <select class="form-control"
                                                                                                    name="power">
                                                                                                    <option>✘</option>
                                                                                                    <option>🔌</option>
                                                                                                    <option>🔌🔌
                                                                                                    </option>
                                                                                                    <option>🔌🔌🔌
                                                                                                    </option>
                                                                                                    <option>🔌🔌🔌🔌
                                                                                                    </option>
                                                                                                    <option>🔌🔌🔌🔌🔌
                                                                                                    </option>
                                                                                </select>
                                                            </div>

                                                            <button type="submit"
                                                                                class="btn btn-warning">Submit</button>

                                                            <a href="{{ url_for('home') }}" class="btn btn-light">
                                                                                Back Home
                                                            </a>
                                        </form>

                    </div>

</body>

</html>
